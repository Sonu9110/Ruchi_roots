<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ruchiroots</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#2c3e50;}
        .login-container{max-width:400px;margin:100px auto;background:white;border-radius:30px;padding:40px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.1);}
        .login-container img{width:80px;border-radius:12px;margin-bottom:15px;}
        .admin-login-form input{width:100%;padding:14px;margin:12px 0;border:2px solid #e0e0e0;border-radius:25px;}
        .admin-login-form button{background:#d35400;color:white;border:none;padding:12px;width:100%;border-radius:25px;cursor:pointer;font-weight:bold;}
        .admin-header{background:#2c3e50;color:white;padding:15px 25px;display:flex;justify-content:space-between;align-items:center;}
        .logout-btn{background:#e74c3c;border:none;padding:8px 20px;border-radius:30px;color:white;cursor:pointer;}
        .container{max-width:1400px;margin:20px auto;padding:20px;}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
        .stat-card{background:white;border-radius:20px;padding:20px;box-shadow:0 2px 5px rgba(0,0,0,0.05);border-left:5px solid #d35400;}
        .stat-card p{font-size:28px;font-weight:bold;}
        .section{background:white;border-radius:24px;padding:25px;margin-bottom:30px;}
        .section h3{margin-bottom:20px;color:#d35400;border-left:5px solid #d35400;padding-left:15px;}
        .product-form{background:#fef8e8;padding:20px;border-radius:20px;display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
        .product-form input,.product-form textarea,.product-form select{padding:10px;border:1px solid #ddd;border-radius:12px;}
        button{padding:6px 12px;border-radius:20px;border:none;cursor:pointer;font-weight:500;}
        .update-btn{background:#2ecc71;color:white;}
        .delete-btn{background:#e74c3c;color:white;}
        .edit-btn{background:#f39c12;color:white;}
        .toggle-btn{background:#3498db;color:white;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;justify-content:center;align-items:center;}
        .modal-content{background:white;border-radius:30px;padding:25px;max-width:500px;width:90%;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2c3e50;color:white;padding:12px 24px;border-radius:40px;z-index:2000;animation:fadeOut 3s;}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .hidden{display:none;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #eee;}
        th{background:#fef8e8;}
        @media (max-width:768px){.product-form{flex-direction:column;} table{font-size:12px;}}
    </style>
</head>
<body>
<div id="loginSection" class="login-container">
    <img src="https://res.cloudinary.com/dmgdwyj87/image/upload/v1/LOGO_lrub7m" alt="Logo">
    <h2>Admin Login</h2>
    <div class="admin-login-form">
        <input type="text" id="adminUsername" placeholder="Username">
        <input type="password" id="adminPassword" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
    </div>
</div>
<div id="dashboardSection" class="hidden">
    <div class="admin-header"><h2> Ruchiroots | Admin</h2><button class="logout-btn" onclick="adminLogout()">Logout</button></div>
    <div class="container">
        <div class="stats" id="stats"></div>
        <div class="section"><h3>📦 Product Management</h3>
            <div class="product-form">
                <input type="text" id="productName" placeholder="Product Name">
                <textarea id="productDesc" placeholder="Description" rows="1"></textarea>
                <input type="number" id="productPrice" placeholder="Price">
                <label><input type="checkbox" id="hasVariants"> Has Variants</label>
                <div id="variantFields" style="display:none;"><input type="text" id="variantPrices" placeholder='{"250g":50,"500g":90,"1kg":170}' style="width:100%;"></div>
                <input type="file" id="productImage">
                <button onclick="addProduct()">Add Product</button>
            </div>
            <div id="productsList"></div>
        </div>
        <div class="section"><h3>📋 Orders</h3><div id="ordersList"></div></div>
    </div>
</div>
<div id="editProductModal" class="modal"><div class="modal-content"><h3>Edit Product</h3><div style="display:flex;flex-direction:column;gap:12px;"><input type="hidden" id="editProductId"><input type="text" id="editProductName" placeholder="Name"><textarea id="editProductDesc" placeholder="Description"></textarea><input type="number" id="editProductPrice" placeholder="Price"><label><input type="checkbox" id="editHasVariants"> Has Variants</label><div id="editVariantFields" style="display:none;"><input type="text" id="editVariantPrices" placeholder='{"250g":50,"500g":90,"1kg":170}'></div><input type="file" id="editProductImage"><div><button class="update-btn" onclick="updateProduct()">Save</button><button class="delete-btn" onclick="closeModal('editProductModal')">Cancel</button></div></div></div></div>
<script>
    let adminToken=null;
    function showToast(msg,isErr=false){let t=document.createElement('div');t.className='toast';t.style.backgroundColor=isErr?'#e74c3c':'#2c3e50';t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
    async function adminLogin(){let u=document.getElementById('adminUsername').value,p=document.getElementById('adminPassword').value;if(!u||!p){showToast('Enter credentials',true);return;}let res=await fetch('/api/auth/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});let data=await res.json();if(data.success){adminToken=data.token;localStorage.setItem('adminToken',adminToken);document.getElementById('loginSection').classList.add('hidden');document.getElementById('dashboardSection').classList.remove('hidden');loadStats();loadProducts();loadOrders();showToast(`Welcome ${u}`);}else showToast('Invalid credentials',true);}
    function adminLogout(){localStorage.removeItem('adminToken');adminToken=null;document.getElementById('loginSection').classList.remove('hidden');document.getElementById('dashboardSection').classList.add('hidden');showToast('Logged out');}
    async function loadStats(){let res=await fetch('/api/admin/stats',{headers:{Authorization:`Bearer ${adminToken}`}});let s=await res.json();document.getElementById('stats').innerHTML=`<div class="stat-card"><h3>Total Orders</h3><p>${s.total_orders}</p></div><div class="stat-card"><h3>Pending</h3><p>${s.pending_orders}</p></div><div class="stat-card"><h3>Revenue</h3><p>₹${s.total_revenue||0}</p></div>`;}
    async function loadProducts(){let res=await fetch('/api/admin/products',{headers:{Authorization:`Bearer ${adminToken}`}});let prods=await res.json();if(!prods.length){document.getElementById('productsList').innerHTML='<p>No products</p>';return;}let html=`<table><thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Price</th><th>Variants</th><th>Available</th><th>Actions</th></tr></thead><tbody>`;prods.forEach(p=>{let vt='-';if(p.has_variants&&p.variant_prices)try{vt=Object.keys(JSON.parse(p.variant_prices)).join(',')}catch(e){}html+=`<tr><td>${p.id}</td><td>${p.image_url?`<img src="${p.image_url}" width="40">`:'-'}</td><td>${escapeHtml(p.name)}</td><td>₹${p.price}</td><td>${vt}</td><td>${p.is_available?'✅':'❌'}</td><td><button class="toggle-btn" onclick="toggleProduct(${p.id},${!p.is_available})">${p.is_available?'Disable':'Enable'}</button> <button class="edit-btn" onclick="showEditModal(${p.id})">Edit</button> <button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button></td></tr>`;});html+=`</tbody></table>`;document.getElementById('productsList').innerHTML=html;}
    async function addProduct(){let fd=new FormData();fd.append('name',document.getElementById('productName').value);fd.append('description',document.getElementById('productDesc').value);fd.append('price',document.getElementById('productPrice').value);fd.append('has_variants',document.getElementById('hasVariants').checked);if(document.getElementById('hasVariants').checked)fd.append('variant_prices',document.getElementById('variantPrices').value);let file=document.getElementById('productImage').files[0];if(file)fd.append('image',file);let res=await fetch('/api/admin/products',{method:'POST',headers:{Authorization:`Bearer ${adminToken}`},body:fd});if(res.ok){showToast('Product added');loadProducts();}else showToast('Add failed',true);}
    async function toggleProduct(id,enable){await fetch(`/api/admin/products/${id}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${adminToken}`},body:JSON.stringify({is_available:enable})});showToast(`Product ${enable?'enabled':'disabled'}`);loadProducts();}
    async function deleteProduct(id){if(!confirm('Delete permanently?'))return;await fetch(`/api/admin/products/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${adminToken}`}});showToast('Deleted');loadProducts();}
    async function showEditModal(id){let res=await fetch('/api/admin/products',{headers:{Authorization:`Bearer ${adminToken}`}});let prods=await res.json();let p=prods.find(x=>x.id==id);if(!p)return;document.getElementById('editProductId').value=p.id;document.getElementById('editProductName').value=p.name;document.getElementById('editProductDesc').value=p.description||'';document.getElementById('editProductPrice').value=p.price;let hv=p.has_variants===1;document.getElementById('editHasVariants').checked=hv;document.getElementById('editVariantFields').style.display=hv?'block':'none';if(hv&&p.variant_prices)document.getElementById('editVariantPrices').value=JSON.stringify(p.variant_prices);else document.getElementById('editVariantPrices').value='';document.getElementById('editProductImage').value='';document.getElementById('editProductModal').style.display='flex';}
    async function updateProduct(){let id=document.getElementById('editProductId').value;let fd=new FormData();fd.append('name',document.getElementById('editProductName').value);fd.append('description',document.getElementById('editProductDesc').value);fd.append('price',document.getElementById('editProductPrice').value);fd.append('has_variants',document.getElementById('editHasVariants').checked);if(document.getElementById('editHasVariants').checked)fd.append('variant_prices',document.getElementById('editVariantPrices').value);let file=document.getElementById('editProductImage').files[0];if(file)fd.append('image',file);let res=await fetch(`/api/admin/products/${id}`,{method:'PUT',headers:{Authorization:`Bearer ${adminToken}`},body:fd});if(res.ok){showToast('Product updated');closeModal('editProductModal');loadProducts();}else showToast('Update failed',true);}
    async function loadOrders(){let res=await fetch('/api/admin/orders',{headers:{Authorization:`Bearer ${adminToken}`}});let orders=await res.json();if(!orders.length){document.getElementById('ordersList').innerHTML='<p>No orders</p>';return;}let html=`<table><thead><tr><th>ID</th><th>Customer</th><th>Mobile</th><th>Address</th><th>Items</th><th>Total</th><th>Status</th><th>Delivery Date</th><th>Update</th><th>Delete</th></tr></thead><tbody>`;orders.forEach(o=>{let itemsList=(o.items||[]).map(i=>i.name).join(', ');html+=`<tr><td>#${o.id}</td><td>${escapeHtml(o.customer_name)}</td><td>${o.customer_mobile}</td><td>${escapeHtml(o.address)}</td><td>${itemsList}</td><td>₹${o.total_amount}</td><td><select id="status_${o.id}"><option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='confirmed'?'selected':''}>confirmed</option><option ${o.status==='preparing'?'selected':''}>preparing</option><option ${o.status==='out for delivery'?'selected':''}>out for delivery</option><option ${o.status==='delivered'?'selected':''}>delivered</option></select></td><td><input type="datetime-local" id="delivery_${o.id}" value="${o.delivery_date_time?.slice(0,16)||''}"></td><td><button class="update-btn" onclick="updateOrder(${o.id})">Update</button></td><td><button class="delete-btn" onclick="deleteOrder(${o.id})">Delete</button></td></tr>`;});html+=`</tbody></table>`;document.getElementById('ordersList').innerHTML=html;}
    async function updateOrder(id){let status=document.getElementById(`status_${id}`).value;let dt=document.getElementById(`delivery_${id}`).value;let res=await fetch(`/api/admin/orders/${id}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${adminToken}`},body:JSON.stringify({status,delivery_date_time:dt})});if(res.ok){showToast(`Order #${id} updated`);loadOrders();loadStats();}else showToast('Update failed',true);}
    async function deleteOrder(id){if(!confirm(`Delete order #${id}?`))return;let res=await fetch(`/api/admin/orders/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${adminToken}`}});if(res.ok){showToast(`Order #${id} deleted`);loadOrders();loadStats();}else showToast('Delete failed',true);}
    function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
    function closeModal(id){document.getElementById(id).style.display='none';}
    document.getElementById('hasVariants').addEventListener('change',e=>document.getElementById('variantFields').style.display=e.target.checked?'block':'none');
    document.getElementById('editHasVariants').addEventListener('change',e=>document.getElementById('editVariantFields').style.display=e.target.checked?'block':'none');
    if(localStorage.getItem('adminToken')){adminToken=localStorage.getItem('adminToken');document.getElementById('loginSection').classList.add('hidden');document.getElementById('dashboardSection').classList.remove('hidden');loadStats();loadProducts();loadOrders();}
</script>
</body>
</html>
